{% extends 'base.html' %}
{% block title %}Log in — AskPupkin{% endblock %}
{% block content %}
<div class="mb-4">
    <h2 class="fw-bold">Log in</h2>
    <p class="text-muted">Введите свои данные для доступа к профилю.</p>
</div>
<form class="p-4 border rounded bg-white shadow-sm" method="post">
    <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="Username">
    </div>
    <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Password">
    </div>
    <button type="submit" class="btn btn-primary">Log in</button>
    <a href="{% url 'core:signup' %}" class="btn btn-link">Sign up</a>
</form>
{% endblock %}
