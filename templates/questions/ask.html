{% extends 'base.html' %}
{% block title %}Ask a Question — AskPupkin{% endblock %}
{% block content %}
<div class="mb-4">
    <h2 class="fw-bold">Ask a New Question</h2>
    <p class="text-muted">Заполните форму, чтобы опубликовать вопрос.</p>
</div>
<form class="p-4 border rounded bg-white shadow-sm">
    <div class="mb-3">
        <label class="form-label" for="title">Title</label>
        <input type="text" class="form-control" id="title" name="title" placeholder="Question title">
    </div>
    <div class="mb-3">
        <label class="form-label" for="text">Text</label>
        <textarea class="form-control" id="text" name="text" rows="6" placeholder="Describe your problem..."></textarea>
    </div>
    <div class="mb-3">
        <label class="form-label" for="tags">Tags</label>
        <input type="text" class="form-control" id="tags" name="tags" placeholder="python, django, web">
    </div>
    <button type="submit" class="btn btn-success px-4">Post question</button>
</form>
{% endblock %}
