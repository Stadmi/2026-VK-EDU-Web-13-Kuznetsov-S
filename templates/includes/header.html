{% load static %}
<header class="p-3 mb-3 border-bottom bg-white sticky-top">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between">
            <a href="{% url 'questions:index' %}" class="text-dark text-decoration-none fw-bold fs-4">AskPupkin</a>
            <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-center mx-4" style="max-width: 600px;">
                <form class="w-100" action="" method="get">
                    <input type="search" class="form-control rounded-pill" placeholder="Search questions..." aria-label="Search" name="query">
                </form>
                <a href="{% url 'questions:ask' %}" class="btn btn-success fw-bold px-4 rounded-pill shadow-sm">ASK</a>
            </div>
            <div class="user-profile d-flex align-items-center gap-3">
                <div class="user-info d-flex flex-column align-items-end">
                    <span class="fw-bold small mb-2" style="color: #343a40;">Megan Fox</span>
                    <div class="user-btn-group d-flex gap-1">
                        <a href="{% url 'core:profile' %}" class="btn-profile-tag">profile</a>
                        <a href="{% url 'core:login' %}" class="btn-profile-tag logout">log in</a>
                    </div>
                </div>
                <img src="{% static 'img/megan.jpg' %}" alt="Profile" width="60" height="60" class="rounded border shadow-sm">
            </div>
        </div>
    </div>
</header>
