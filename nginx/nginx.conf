user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=main:10m max_size=100m inactive=60m;
    upstream gunicorn { server web:8000; }

    server {
        listen 80;
        server_name localhost;

        location ^~ /uploads/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        location ~* \.(js|css|jpe?g|png|gif|ico|svg|woff2?|ttf|html)$ {
            root /app/staticfiles;
            try_files $uri @proxy;
            expires 30d;
            add_header Cache-Control "public";
        }

        location @proxy { proxy_pass http://gunicorn; proxy_set_header Host $host; }

        location / {
            proxy_pass http://gunicorn;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache main;
            proxy_cache_valid 200 10m;
            proxy_cache_use_stale error timeout;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
